<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Spence</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0e0e0e;--card:#161616;
--text:#f0f0f0;--text2:#999;--text3:#555;
--border:#2a2a2a;--hover:#1e1e1e;
--font-display:'Outfit',sans-serif;
--font-body:'DM Sans',sans-serif;
}
html{height:100%}
body{
background:var(--bg);color:var(--text);font-family:var(--font-body);
min-height:100%;display:flex;align-items:center;justify-content:center;
padding:40px 20px;position:relative;overflow-x:hidden;
}
::selection{background:#fff;color:#000}

.bg-grain{
position:fixed;inset:0;pointer-events:none;opacity:0.03;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.container{
width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;
position:relative;z-index:1;
}



.name{
font-family:var(--font-display);font-size:28px;font-weight:600;
letter-spacing:0.04em;color:#fff;margin-bottom:6px;
opacity:0;animation:fadeUp 0.5s ease 0.3s forwards;
}

.title{
font-size:13px;color:var(--text2);letter-spacing:0.12em;
font-weight:300;margin-bottom:28px;
opacity:0;animation:fadeUp 0.5s ease 0.4s forwards;
}

.socials{
display:flex;gap:20px;margin-bottom:36px;
opacity:0;animation:fadeUp 0.5s ease 0.5s forwards;
}
.social-link{
width:40px;height:40px;border-radius:50%;
border:1px solid var(--border);
display:flex;align-items:center;justify-content:center;
color:var(--text2);text-decoration:none;
transition:all 0.3s;
}
.social-link:hover{border-color:#fff;color:#fff;transform:translateY(-2px)}
.social-link svg{width:18px;height:18px}

.divider{
width:60px;height:1px;background:var(--border);margin-bottom:32px;
opacity:0;animation:fadeUp 0.4s ease 0.55s forwards;
}

.links{
display:flex;flex-direction:column;gap:12px;width:100%;
}

.link-btn{
display:flex;align-items:center;justify-content:space-between;
padding:16px 22px;
background:var(--card);border:1px solid var(--border);
color:#fff;text-decoration:none;
font-family:var(--font-body);font-size:14px;font-weight:400;
letter-spacing:0.04em;
transition:all 0.3s;
opacity:0;animation:fadeUp 0.5s ease forwards;
}
.link-btn:nth-child(1){animation-delay:0.6s}
.link-btn:nth-child(2){animation-delay:0.68s}
.link-btn:nth-child(3){animation-delay:0.76s}
.link-btn:nth-child(4){animation-delay:0.84s}

.link-btn:hover{
border-color:#555;background:var(--hover);transform:translateY(-1px);
}
.link-btn svg{
width:14px;height:14px;color:var(--text3);transition:all 0.3s;flex-shrink:0;
}
.link-btn:hover svg{color:#fff;transform:translateX(3px)}

.link-label{display:flex;align-items:center;gap:12px}
.link-icon{
width:28px;height:28px;display:flex;align-items:center;justify-content:center;
background:rgba(255,255,255,0.05);border-radius:4px;flex-shrink:0;
}
.link-icon svg{width:14px;height:14px;color:var(--text2)}

.footer{
margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:10px;
opacity:0;animation:fadeUp 0.4s ease 1s forwards;
}
.footer-mark{
display:flex;align-items:center;gap:8px;
}
.footer-dots{display:flex;flex-direction:column;gap:2px}
.footer-dot{width:4px;height:3px;background:var(--text3);border-radius:1px}
.footer-asp{
font-family:var(--font-display);font-size:11px;font-weight:500;
letter-spacing:0.08em;color:var(--text3);
}
.footer-tagline{
font-size:11px;color:var(--text3);letter-spacing:0.06em;font-weight:300;font-style:italic;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(12px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>
